# Reload tmux config with leader r
unbind r
bind r source-file ~/.config/tmux/tmux.conf


# Set mouse mode
set -g mouse on


# 256 Color mode
set -g default-terminal "screen-256color"
set-option -g terminal-overrides ',xterm-256color:RGB'

# Aliases
set -g command-alias[100] "ns=new-session"
set -g command-alias[101] "news=new-session"
set -g command-alias[102] "rs=rename-session"
set -g command-alias[103] "renames=rename-session"

