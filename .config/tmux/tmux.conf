# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.config/tmux/plugins/tpm/tpm'

# Use vim keys for scrollback (Enter Scrollback with: <ctrl + b> + "[" )
# My overrides for yank behavior with scrollback mode
# y to yank selection, ENTER to yank and exit scrollback
set -g mode-keys vi
setw -g mode-keys vi
unbind -T copy-mode-vi y
bind-key -T copy-mode-vi y send -X copy-pipe "wl-copy"
bind-key -T copy-mode-vi Enter send -X copy-pipe-and-cancel "wl-copy"
